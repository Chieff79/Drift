---
name: Bug Report
description: Report a bug encountered while using Drift
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        For support, please join [our Telegram](https://t.me/driftvpn).

        Please provide a descriptive and reproducible report with as much detail as possible (screenshots, logs, steps to reproduce).

        Please DO NOT use this template to ask questions — use Telegram instead.
  - type: checkboxes
    id: confirm-search
    attributes:
      label: Search first
      description: Please search [existing issues](https://github.com/Chieff79/Drift/issues) before reporting.
      options:
        - label: I searched and no similar issues were found
          required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform/OS
      description: What platform are you seeing the problem on?
      multiple: true
      options:
        - Android
        - iOS
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: "OS version"
      description: "Please provide the operating system version. (Example: iOS 17.4)"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Drift Version
      description: "What version of Drift are you using?"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What Happened?
      description: |
        Please provide as much info as possible.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output.
    validations:
      required: false
